<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSICDUS — The Void</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Times New Roman', 'Garamond', serif;
            overflow-x: hidden;
            cursor: none;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.07"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: 1;
            opacity: 0.6;
        }

        .custom-cursor {
            position: fixed;
            width: 30px;
            height: 30px;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }
        .custom-cursor span {
            font-size: 22px;
            color: rgba(255,255,255,0.7);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            animation: cursorPulse 2s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes cursorPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); text-shadow: 0 0 15px white; }
        }

        .menu {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            background: rgba(134, 134, 134, 0.048);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 50px;
            z-index: 100;
            border: 0.5px solid rgba(255, 255, 255, 0.15);
        }
        .menu a {
            color: #5f5f5f;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            transition: 0.5s;
            font-family: 'Times New Roman', serif;
            text-transform: uppercase;
        }
        .menu a:hover {
            color: rgb(255, 255, 255);
            text-shadow: 0 0 8px rgb(255, 255, 255);
            letter-spacing: 15px;
        }

        .void-header {
            text-align: center;
            padding: 8rem 2rem 3rem;
            position: relative;
            z-index: 5;
        }
        .void-header h1 {
            font-size: 5rem;
            letter-spacing: 25px;
            color: rgba(255, 255, 255, 0.329);
            font-weight: 300;
            filter: blur(1.5px);
            text-transform: uppercase;
            animation: fadeInDown 2s ease-out;
        }
        .void-header p {
            color: rgba(255,255,255,0.25);
            letter-spacing: 5px;
            margin-top: 1rem;
            font-style: italic;
            font-size: 0.8rem;
        }
        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-50px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(1.5px); }
        }

        .gallery {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            position: relative;
            z-index: 5;
        }

        .gallery-item {
            background: rgba(5,5,15,0.5);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            overflow: hidden;
            border: 0.5px solid rgba(255,255,255,0.08);
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }
        .gallery-item:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 0 40px rgba(255,255,255,0.15);
        }

        .image-wrapper {
            width: 100%;
            height: 280px;
            overflow: hidden;
            position: relative;
            background: #0a0a0a;
        }
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
            transition: all 0.5s ease;
            filter: grayscale(0.3) contrast(1.1);
        }
        .gallery-item:hover .image-wrapper img {
            opacity: 1;
            transform: scale(1.05);
            filter: grayscale(0) contrast(1.2);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* لوگو وسط عکس وقتی موس میره روش */
        .image-wrapper::after {
            content: "✦";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: rgba(255,255,255,0.9);
            font-size: 3rem;
            text-shadow: 0 0 20px white;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 10;
        }
        .gallery-item:hover .image-wrapper::after {
            transform: translate(-50%, -50%) scale(1);
        }

        .item-title {
            padding: 1.2rem;
            text-align: center;
        }
        .item-title h3 {
            color: rgba(255,255,255,0.6);
            letter-spacing: 4px;
            font-size: 0.9rem;
            font-weight: 300;
            text-transform: uppercase;
        }
        .item-title p {
            color: rgba(255,255,255,0.25);
            font-size: 0.7rem;
            margin-top: 0.5rem;
            letter-spacing: 2px;
            font-style: italic;
        }

        /* Modal وسط صفحه */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .modal.active {
            display: flex;
            animation: fadeInModal 0.4s ease-out;
        }
        @keyframes fadeInModal {
            0% { opacity: 0; backdrop-filter: blur(0px); }
            100% { opacity: 1; backdrop-filter: blur(15px); }
        }
        .modal-content {
            max-width: 600px;
            width: 90%;
            background: rgba(10,10,20,0.9);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 2rem;
            text-align: center;
            animation: slideUp 0.4s ease-out;
            position: relative;
        }
        @keyframes slideUp {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .modal-image-container {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        .modal-image {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            border: 0.5px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        .modal-image.zoomed {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            height: 90vh;
            object-fit: contain;
            z-index: 1100;
            border-radius: 10px;
            cursor: zoom-out;
        }
        .zoom-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: 0.5px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
            z-index: 15;
            color: white;
        }
        .zoom-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }
        .modal-title {
            font-size: 1.8rem;
            letter-spacing: 6px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 0.5rem;
        }
        .modal-subtitle {
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.4);
            font-style: italic;
            margin-bottom: 1rem;
        }
        .modal-description {
            font-size: 0.9rem;
            line-height: 1.6;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }
        .modal-close {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal-close:hover {
            color: white;
            letter-spacing: 4px;
        }

        /* فوتر */
        .footer {
            text-align: center;
            padding: 2rem 3rem;
            position: relative;
            z-index: 5;
            border-top: 0.5px solid rgba(255,255,255,0.05);
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer-left, .footer-right {
            flex: 1;
        }
        .footer-left {
            text-align: left;
        }
        .footer-right {
            text-align: right;
        }
        .footer-center {
            text-align: center;
            color: rgba(255,255,255,0.1);
            font-size: 0.7rem;
            letter-spacing: 3px;
            font-style: italic;
        }
        .social-icon {
            font-size: 1.8rem;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .social-icon span {
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
        .instagram {
            color: #E4405F;
        }
        .instagram:hover {
            color: #ff6b8f;
            text-shadow: 0 0 15px #E4405F;
            transform: scale(1.1);
        }
        .whatsapp {
            color: #25D366;
        }
        .whatsapp:hover {
            color: #4ee090;
            text-shadow: 0 0 15px #25D366;
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .void-header h1 { font-size: 2rem; letter-spacing: 10px; }
            .menu { gap: 15px; padding: 6px 15px; top: 10px; }
            .menu a { font-size: 10px; letter-spacing: 1px; }
            .gallery { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; padding: 1rem; }
            .image-wrapper { height: 220px; }
            .modal-title { font-size: 1.2rem; letter-spacing: 3px; }
            .modal-image { height: 200px; }
            .footer { flex-direction: column; gap: 1rem; padding: 1.5rem; }
            .footer-left, .footer-right, .footer-center { text-align: center; }
            .social-icon { font-size: 1.4rem; }
        }
    </style>
</head>

<body>

<div class="custom-cursor" id="customCursor">
    <span>✦</span>
</div>

<div class="menu">
    <a href="index.html">Home</a>
    <a href="void.html">Void</a>
    <a href="Web.html">Videos</a>
    <a href="static.html">Static</a>
</div>

<div class="void-header">
    <h1>THE VOID</h1>
    <p>where memories fade into static</p>
</div>

<div class="gallery" id="gallery"></div>

<div class="footer">
    <div class="footer-left">
        <a href="#" id="instagramLink" class="social-icon instagram" target="_blank">
            🪐 <span>Instagram</span>
        </a>
    </div>
    <div class="footer-center">
        ✦ the void doesn't forget • you were warned ✦
    </div>
    <div class="footer-right">
        <a href="#" id="whatsappLink" class="social-icon whatsapp" target="_blank">
            🌌 <span>WhatsApp</span>
        </a>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <div class="modal-image-container">
            <img class="modal-image" id="modalImage" src="" alt="">
            <div class="zoom-btn" id="zoomBtn">🔍</div>
        </div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-subtitle" id="modalSubtitle"></div>
        <div class="modal-description" id="modalDescription"></div>
        <div class="modal-close" id="modalClose">✦ close ✦</div>
    </div>
</div>

<script>
    // لینک‌ها (اینجا تغییر بده)
    document.getElementById('instagramLink').href = 'https://instagram.com/prctmll';
    document.getElementById('whatsappLink').href = 'https://wa.me/989123456789';

    const imagesData = [
        {
            src: "image1.jpg",
            fallback: "https://picsum.photos/id/104/500/500",
            title: "ECHO 001",
            subtitle: "whispers in the dark",
            description: "Somewhere between sleep and awakening, a voice calls your name. You can't tell if it's real or just a memory fading into static."
        },
        {
            src: "image2.jpg",
            fallback: "https://picsum.photos/id/106/500/500",
            title: "ECHO 002",
            subtitle: "frozen in time",
            description: "A moment captured between heartbeats. Time doesn't move here. It waits. It watches. It remembers every mistake you ever made."
        },
        {
            src: "image3.jpg",
            fallback: "https://picsum.photos/id/15/500/500",
            title: "ECHO 003",
            subtitle: "the watching eye",
            description: "The void has eyes. Thousands of them. And right now, all of them are looking at you. Don't blink. It smiles when you do."
        },
        {
            src: "image4.jpg",
            fallback: "https://picsum.photos/id/22/500/500",
            title: "ECHO 004",
            subtitle: "static dreams",
            description: "Dreams are just static electricity in the brain. But sometimes... sometimes the static dreams back. And you hear it. Don't you?"
        },
        {
            src: "image5.jpg",
            fallback: "https://picsum.photos/id/42/500/500",
            title: "ECHO 005",
            subtitle: "never coming back",
            description: "You left something behind. A thought. A feeling. A piece of yourself. It's still there, waiting in the dark. It misses you."
        },
        {
            src: "image6.jpg",
            fallback: "https://picsum.photos/id/88/500/500",
            title: "ECHO 006",
            subtitle: "nothing ever ends",
            description: "People think death is the end. They're wrong. Nothing ever ends here. It just changes shape. And waits."
        }
    ];

    const gallery = document.getElementById('gallery');
    
    imagesData.forEach((item) => {
        const galleryItem = document.createElement('div');
        galleryItem.className = 'gallery-item';
        galleryItem.innerHTML = `
            <div class="image-wrapper">
                <img src="${item.src}" alt="${item.title}" onerror="this.src='${item.fallback}'">
            </div>
            <div class="item-title">
                <h3>${item.title}</h3>
                <p>${item.subtitle}</p>
            </div>
        `;
        
        galleryItem.addEventListener('click', () => {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modalImage');
            modalImg.src = item.src;
            modalImg.onerror = () => {
                modalImg.src = item.fallback;
            };
            modalImg.classList.remove('zoomed');
            document.getElementById('modalTitle').innerText = item.title;
            document.getElementById('modalSubtitle').innerText = item.subtitle;
            document.getElementById('modalDescription').innerText = item.description;
            modal.classList.add('active');
        });
        
        gallery.appendChild(galleryItem);
    });

    const modal = document.getElementById('modal');
    const modalClose = document.getElementById('modalClose');
    const modalImage = document.getElementById('modalImage');
    const zoomBtn = document.getElementById('zoomBtn');
    
    modalClose.addEventListener('click', () => {
        modal.classList.remove('active');
        modalImage.classList.remove('zoomed');
    });
    
    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.classList.remove('active');
            modalImage.classList.remove('zoomed');
        }
    });
    
    zoomBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        modalImage.classList.toggle('zoomed');
    });

    const cursor = document.getElementById('customCursor');
    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });
</script>

<audio id="pageMusic" loop style="display:none;">
    <source src="music-void.mp3" type="audio/mpeg">
</audio>

<script>
    (function() {
        let audio = document.getElementById('pageMusic');
        if (audio) {
            audio.volume = 0.3;
            audio.play().catch(() => {
                document.body.addEventListener('click', function playOnce() {
                    audio.play();
                    document.body.removeEventListener('click', playOnce);
                }, { once: true });
            });
        }
    })();
</script>

</body>
</html>
