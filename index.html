<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSICDUS — Slow Breathing Saturn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #000000 0%, #050505 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Times New Roman', 'Garamond', serif;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.08"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: 2;
            opacity: 0.6;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 30%, #000000 100%);
            pointer-events: none;
            z-index: 2;
        }

        .container {
            position: relative;
            z-index: 3;
            text-align: center;
            max-width: 600px;
            width: 90%;
            padding: 2rem;
        }

        .logo-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
            animation: fadeInLogo 3s ease-out forwards;
            opacity: 0;
        }

        .logo-svg {
            width: 100%;
            max-width: 320px;
            height: auto;
            filter: drop-shadow(0 0 1px rgba(255,255,255,0.05));
            opacity: 0.75;
            will-change: transform;
        }

        .brand-text {
            font-size: 2rem;
            letter-spacing: 14px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            font-weight: 300;
            filter: blur(0.8px);
            margin-top: 1.5rem;
        }

        .haunting-line {
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.25);
            margin-top: 1.5rem;
            font-style: italic;
            filter: blur(0.6px);
        }

        nav {
            position: fixed;
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 2rem;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            border: 0.5px solid rgba(255,255,255,0.08);
            z-index: 10;
        }

        nav a {
            color: rgba(255,255,255,0.35);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 5px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        nav a:hover {
            color: rgba(255,255,255,0.7);
            filter: blur(0.8px);
            letter-spacing: 3px;
        }

        footer {
            position: fixed;
            bottom: 1.5rem;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.12);
            letter-spacing: 2px;
            font-style: italic;
            filter: blur(0.5px);
            z-index: 10;
        }

        @keyframes fadeInLogo {
            0% { opacity: 0; transform: scale(0.92); filter: blur(5px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        @media (max-width: 650px) {
            .brand-text { font-size: 1.1rem; letter-spacing: 14px; }
            .haunting-line { font-size: 0.6rem; }
            nav { top: 1rem; right: 1rem; gap: 1rem; padding: 0.4rem 1rem; }
            nav a { font-size: 0.65rem; }
            .logo-svg { max-width: 240px; }
        }
    </style>
</head>
<body>

<style>
    body {
        cursor: none;
    }
    
    .custom-cursor {
        position: fixed;
        width: 20px;
        height: 20px;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition: transform 0.1s ease;
    }
    
    
    .custom-cursor span {
        font-size: 20px;
        color: rgba(255,255,255,0.8);
        text-shadow: 0 0 10px rgba(255,255,255,0.5);
        animation: starPulse 2s ease-in-out infinite;
        display: inline-block;
    }
    
    @keyframes starPulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.2); text-shadow: 0 0 15px rgba(255,255,255,0.8); }
    }
</style>

<div class="custom-cursor" id="customCursor">
    <span>✦</span>
</div>

<script>
    const cursor = document.getElementById('customCursor');
    document.addEventListener('mousemove', function(e) {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });
</script>




<div class="container">
    <div class="logo-wrapper">
        <svg class="logo-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="ringFade" x1="0%" y1="0%" x2="100%" y2="0%">

                    <stop offset="50%" stop-color="white" stop-opacity="0.7"/>

                </linearGradient>
                <linearGradient id="fadeVertical" x1="0%" y1="0%" x2="0%" y2="100%">

<script>
    // SLOW Rotating Saturn Rings (slower speed)
    (function rotateSaturnRings() {
        const rings = document.querySelectorAll('.logo-svg ellipse');
        if (rings.length === 0) return;
        
        let angle = 0;
        const speed = 0.25; // slower rotation (was 0.6)
        
        function animate() {
            angle = (angle + speed) % 360;
            
            rings.forEach((ring, index) => {
                if (index === 0) {
                    ring.style.transform = `rotate(${angle}deg)`;
                } else if (index === 1) {
                    ring.style.transform = `rotate(${-angle * 0.3}deg)`;
                } else {
                    ring.style.transform = `rotate(${angle * 0.4}deg)`;
                }
                ring.style.transformOrigin = '150px 140px';
            });
            
            requestAnimationFrame(animate);
        }
        
        animate();
    })();

    // SLOW breathing + SLOW zoom in/out (very subtle)
    (function slowBreathingAndZoom() {
        const svg = document.querySelector('.logo-svg');
        if (!svg) return;
        
        let time = 0;
        
        function animate() {
            time = (time + 0.5) % 360; // very slow increment
            
            // VERY SLOW breathing (opacity change)
            const opacity = 0.7 + Math.sin(time * 0.02) * 0.04;
            
            // SLOW zoom in/out (scale: 0.98 to 1.02, very subtle)
            const zoom = 1 + Math.sin(time * 0.015) * 0.015;
            
            // combine zoom and original breathing
            svg.style.transform = `scale(${zoom})`;
            svg.style.opacity = opacity;
            
            // subtle flicker every 12 seconds (rare)
            if (Math.floor(time) % 80 === 0 && time > 0) {
                svg.style.filter = 'blur(1.5px) drop-shadow(0 0 6px rgba(255,255,255,0.1))';
                setTimeout(() => {
                    svg.style.filter = 'drop-shadow(0 0 2px rgba(255,255,255,0.05))';
                }, 200);
            }
            
            requestAnimationFrame(animate);
        }
        
        animate();
    })();
</script>
