<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSICDUS — Gateway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #000000 0%, #0a0a0f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Times New Roman', 'Garamond', serif;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* static noise */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.06"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            opacity: 0.4;
        }

        .gateway {
            text-align: center;
            z-index: 10;
            animation: fadeIn 3s ease-out;
        }

        /* دریم کور لوگو */
        .dream-logo {
            width: 180px;
            height: 180px;
            margin: 0 auto;
            position: relative;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .dream-logo:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .ring {
            fill: none;
            stroke: rgba(255,255,255,0.5);
            stroke-width: 1.2;
            stroke-dasharray: 280 10;
            animation: rotateSlow 12s linear infinite;
        }

        .ring-outer {
            fill: none;
            stroke: rgba(255,255,255,0.2);
            stroke-width: 0.6;
            stroke-dasharray: 4 8;
            animation: rotateReverse 15s linear infinite;
        }

        .star-center {
            fill: none;
            stroke: rgba(255,255,255,0.8);
            stroke-width: 1;
            animation: starPulse 3s ease-in-out infinite;
        }

        .eye {
            fill: none;
            stroke: rgba(255,255,255,0.6);
            stroke-width: 0.8;
        }

        .eye-center {
            fill: rgba(255,255,255,0.7);
            animation: blink 4s ease-in-out infinite;
        }

        .line-fade {
            fill: none;
            stroke: rgba(255,255,255,0.4);
            stroke-width: 0.8;
            stroke-dasharray: 8 6;
        }

        .particle {
            fill: rgba(255,255,255,0.5);
            animation: float 6s ease-in-out infinite;
        }

        .particle:nth-child(2) { animation-delay: 1s; }
        .particle:nth-child(3) { animation-delay: 2s; }
        .particle:nth-child(4) { animation-delay: 3s; }

        @keyframes rotateSlow {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: 300; }
        }

        @keyframes rotateReverse {
            0% { stroke-dashoffset: 0; transform: rotate(0deg); }
            100% { stroke-dashoffset: -300; transform: rotate(360deg); }
        }

        @keyframes starPulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.08); }
        }

        @keyframes blink {
            0%, 90%, 100% { opacity: 0.7; transform: scaleY(1); }
            95% { opacity: 0.1; transform: scaleY(0.1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); opacity: 0.3; }
            50% { transform: translateY(-8px) scale(1.2); opacity: 0.7; }
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.9); filter: blur(8px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .enter-text {
            margin-top: 2rem;
            font-size: 0.7rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            font-style: italic;
            transition: all 0.3s;
            cursor: pointer;
        }

        .dream-logo:hover + .enter-text,
        .enter-text:hover {
            color: rgba(255,255,255,0.7);
            letter-spacing: 8px;
        }

        @media (max-width: 650px) {
            .dream-logo { width: 120px; height: 120px; }
            .enter-text { font-size: 0.5rem; letter-spacing: 4px; margin-top: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="gateway" id="gateway">
        <div class="dream-logo" id="enterBtn">
            <svg viewBox="0 0 200 200" xmlns="index.html">
                <!-- حلقه بیرونی -->
                <circle cx="100" cy="100" r="85" class="ring-outer" />
                
                <!-- حلقه اصلی شکسته -->
                <circle cx="100" cy="100" r="75" class="ring" />
                <circle cx="100" cy="100" r="70" class="ring" style="stroke-dasharray: 250 20; stroke-width: 0.8;" />
                
                <!-- ترک‌ها -->
                <path class="line-fade" d="M 45 70 L 60 85 L 55 100" />
                <path class="line-fade" d="M 150 130 L 140 115 L 145 100" />
                <path class="line-fade" d="M 80 160 L 95 150 L 88 135" />
                
                <!-- چشم مرموز در مرکز -->
                <ellipse cx="100" cy="95" rx="18" ry="10" class="eye" />
                <circle cx="100" cy="95" r="4" class="eye-center" />
                <path class="eye" d="M 82 95 Q 90 88 100 90" stroke-width="0.5" />
                
                <!-- خط عمودی محو -->
                <line x1="100" y1="30" x2="100" y2="75" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="3 4" />
                <line x1="100" y1="105" x2="100" y2="160" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" stroke-dasharray="2 6" />
                
                <!-- ستاره مرکزی -->
                <text x="100" y="65" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="14" class="star-center">✦</text>
                
                <!-- ذرات شناور -->
                <circle cx="45" cy="45" r="2" class="particle" />
                <circle cx="155" cy="55" r="1.5" class="particle" />
                <circle cx="40" cy="130" r="1.8" class="particle" />
                <circle cx="160" cy="150" r="2" class="particle" />
                <circle cx="120" cy="170" r="1.2" class="particle" />
                <circle cx="70" cy="25" r="1.5" class="particle" />
                
                <!-- کتیبه کوچک مرموز -->
                <text x="100" y="185" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="6" letter-spacing="3">✦ D R E A M C O R E ✦</text>
            </svg>
        </div>
        <div class="enter-text" id="enterText">
            ✦ enter the void ✦
        </div>
    </div>

    <script>
        const enterBtn = document.getElementById('enterBtn');
        const enterText = document.getElementById('enterText');
        
        function goToMainSite() {
            // آدرس سایت اصلی رو اینجا بذار
            window.location.href = 'index.html';
        }
        
        enterBtn.addEventListener('click', goToMainSite);
        enterText.addEventListener('click', goToMainSite);
        
        // یه افکت کوچک برای کلیک
        enterBtn.style.transition = 'all 0.1s ease';
        enterBtn.addEventListener('mousedown', () => {
            enterBtn.style.transform = 'scale(0.98)';
        });
        enterBtn.addEventListener('mouseup', () => {
            enterBtn.style.transform = 'scale(1)';
        });
    </script>
</body>
</html>
<style>
    body {
        cursor: none;
    }
    
    .custom-cursor {
        position: fixed;
        width: 20px;
        height: 20px;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition: transform 0.1s ease;
    }
    
    .custom-cursor span {
        font-size: 20px;
        color: rgba(255,255,255,0.8);
        text-shadow: 0 0 10px rgba(255,255,255,0.5);
        animation: starPulse 2s ease-in-out infinite;
        display: inline-block;
    }
    
    @keyframes starPulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.2); text-shadow: 0 0 15px rgba(255,255,255,0.8); }
    }
</style>

<div class="custom-cursor" id="customCursor">
    <span>✦</span>
</div>

<script>
    const cursor = document.getElementById('customCursor');
    document.addEventListener('mousemove', function(e) {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });
</script>







<audio id="pageMusic" loop style="display:none;">
    <source src="ssdnaplytics.io_instagram_audio_DXpWRAQkVth.mp3" type="audio/mpeg">
</audio>

<script>
    (function() {
        let audio = document.getElementById('pageMusic');
        audio.volume = 0.3;
        
        // تلاش برای پخش خودکار
        audio.play().catch(() => {
            document.body.addEventListener('click', function playOnce() {
                audio.play();
                document.body.removeEventListener('click', playOnce);
            }, { once: true });
        });
    })();
</script>
