<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LUSICDUS — Video Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Times New Roman', 'Garamond', serif;
            overflow-x: hidden;
            cursor: none;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.07"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: 1;
            opacity: 0.6;
        }

        .custom-cursor {
            position: fixed;
            width: 30px;
            height: 30px;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }
        .custom-cursor span {
            font-size: 22px;
            color: rgba(255,255,255,0.7);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            animation: cursorPulse 2s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes cursorPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); text-shadow: 0 0 15px white; }
        }

        .menu {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            background: rgba(20, 20, 25, 0.35);
            backdrop-filter: blur(12px);
            padding: 10px 28px;
            border-radius: 60px;
            z-index: 100;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
        }
        .menu a {
            color: #b0b0b0;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 2.5px;
            transition: 0.45s;
            font-family: 'Times New Roman', serif;
            text-transform: uppercase;
        }
        .menu a:hover {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255,255,240,0.9);
            letter-spacing: 5px;
        }

        .videos-header {
            text-align: center;
            padding: 8rem 2rem 3rem;
            position: relative;
            z-index: 5;
        }
        .videos-header h1 {
            font-size: 5rem;
            letter-spacing: 20px;
            color: rgba(255,255,255,0.4);
            font-weight: 300;
            filter: blur(1.5px);
            text-transform: uppercase;
            animation: fadeInDown 2s ease-out;
        }
        .videos-header p {
            color: rgba(255,255,255,0.25);
            letter-spacing: 5px;
            margin-top: 1rem;
            font-style: italic;
            font-size: 0.8rem;
        }
        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-50px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(1.5px); }
        }

        .gallery {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            position: relative;
            z-index: 5;
        }

        .gallery-item {
            background: rgba(5,5,15,0.5);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            overflow: hidden;
            border: 0.5px solid rgba(255,255,255,0.08);
            transition: all 0.5s;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }
        .gallery-item:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 0 40px rgba(255,255,255,0.15);
        }

        .image-wrapper {
            width: 100%;
            height: 260px;
            overflow: hidden;
            position: relative;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-wrapper .instagram-logo {
            font-size: 5rem;
            opacity: 0.5;
            transition: all 0.5s ease;
        }
        .gallery-item:hover .image-wrapper .instagram-logo {
            opacity: 1;
            transform: scale(1.1);
            text-shadow: 0 0 20px #E4405F;
        }

        .image-wrapper::after {
            content: "✦";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: rgba(255,255,255,0.8);
            font-size: 2.5rem;
            text-shadow: 0 0 20px white;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 10;
        }
        .gallery-item:hover .image-wrapper::after {
            transform: translate(-50%, -50%) scale(1);
        }

        .item-title {
            padding: 1rem;
            text-align: center;
        }
        .item-title h3 {
            color: rgba(255,255,255,0.6);
            letter-spacing: 4px;
            font-size: 0.9rem;
            font-weight: 300;
            text-transform: uppercase;
        }
        .item-title p {
            color: rgba(255,255,255,0.25);
            font-size: 0.7rem;
            margin-top: 0.5rem;
            letter-spacing: 2px;
            font-style: italic;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 3rem;
            border-top: 0.5px solid rgba(255,255,255,0.05);
            margin-top: 2rem;
        }
        .footer-left a, .footer-right a {
            font-size: 1.6rem;
            text-decoration: none;
            transition: 0.3s;
        }
        .footer-left a { color: #ccc; }
        .footer-left a:hover { color: #fff; text-shadow: 0 0 8px white; }
        .footer-right a { color: #ccc; }
        .footer-right a:hover { color: #fff; text-shadow: 0 0 8px white; }
        .footer-center {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.2);
        }

        @media (max-width: 768px) {
            .videos-header h1 { font-size: 2rem; letter-spacing: 10px; }
            .menu { gap: 12px; padding: 6px 16px; top: 10px; }
            .menu a { font-size: 9px; letter-spacing: 1px; }
            .gallery { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; padding: 1rem; }
            .image-wrapper { height: 200px; }
            .footer { flex-direction: column; gap: 1rem; padding: 1.5rem; }
        }
    </style>
</head>
